states (max 100): <input id="states"><br>
seed: <input id="seeds"><br>
<button onclick="run()">run</button>
<span id="speedDisplay">cells: 0 | speed: 0.1s</span>
<div id="playfield" style="position:absolute;top:25%;left:25%;height:50%;width:50%;background-color:#202020;z-index:-999;"></div>
<script>
	let timeoutId = null; 
	function mulberry32(a) {
		return function() {
			let t = a += 0x6D2B79F5;
			t = Math.imul(t ^ t >>> 15, t | 1);
			t ^= t + Math.imul(t ^ t >>> 7, t | 61);
			return ((t ^ t >>> 14) >>> 0) / 4294967296;
		}
	}
	function run(){
		if (timeoutId !== null) {
			clearTimeout(timeoutId);
		}
		document.getElementById("playfield").innerHTML = "<div class=\"particle c0\" style=\"position:absolute;width:1%;height:1%;top:50%;left:50%;\"></div>";
		let states = Number(document.getElementById("states").value);
		let worldseed = Number(document.getElementById("seeds").value);
		let simulationStep = 0;
		function simulationTick() {
			simulationStep++;
			const elements = document.querySelectorAll(".particle");
			const currentTotal = elements.length;
			let htmlBuffer = "";
			elements.forEach((element) => {
				let colorState = 0;
				element.classList.forEach(className => {
					if (className.startsWith("c")) {
						colorState = parseInt(className.substring(1)) || 0;
					}
				});
				const deterministicSeed = (colorState + (worldseed * 100));
				const rand = mulberry32(deterministicSeed);
				const topStyle = element.style.top;
				const leftStyle = element.style.left;
				const currentTop = (topStyle !== "") ? parseInt(topStyle) : 50;
				const currentLeft = (leftStyle !== "") ? parseInt(leftStyle) : 50;
				const spawnCount = rand() < 0.5 ? 1 : 2;
				for (let s = 0; s < spawnCount; s++) {
					const randTop = rand();
					const randLeft = rand();
					const randClass = rand();
					const newTop = ((currentTop + (Math.floor(randTop * 3) - 1)) + 100) % 100;
					const newLeft = ((currentLeft + (Math.floor(randLeft * 3) - 1)) + 100) % 100;
					const nextId = Math.floor(randClass * 1000000);
					const nextColorClass = "c" + Math.floor(randClass * states);
					htmlBuffer += `<div class="particle ${nextColorClass}" ` + 
						`data-id="${nextId}" ` + 
						`style="position:absolute; width:1%; height:1%; z-index:100;` + 
						`top:${newTop}%; left:${newLeft}%;"></div>`;
				}
				element.remove();
			});
			if (htmlBuffer !== "") {
				document.getElementById("playfield").insertAdjacentHTML('beforeend', htmlBuffer);
			}
			let dynamicDelay = Math.max(100, (currentTotal * 0.15));
			document.getElementById("speedDisplay").innerText = `cells: ${currentTotal} | speed: ${(Math.round(dynamicDelay))/1000}s`;
			timeoutId = setTimeout(simulationTick, dynamicDelay);
		}
		timeoutId = setTimeout(simulationTick, 100);
	};
</script>
